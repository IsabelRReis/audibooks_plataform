<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Librarian</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./auth.css">
</head>
<body>
    <main class="auth-layout">
        <section class="auth-card">
            <h1>Criar conta</h1>
            <p>Cadastre-se para acessar sua biblioteca de audios.</p>
            <form id="register-form" class="auth-form">
                <label for="register-name">Nome</label>
                <input id="register-name" name="name" type="text" required>

                <label for="register-email">E-mail</label>
                <input id="register-email" name="email" type="email" required>

                <label for="register-password">Senha</label>
                <input id="register-password" name="password" type="password" minlength="8" required>

                <button type="submit">Cadastrar</button>
                <p id="register-feedback" class="auth-feedback"></p>
            </form>
            <p class="auth-alt">Já possui conta? <a href="./login.html">Entrar</a></p>
        </section>
    </main>
    <script src="./config.js"></script>
    <script src="./auth.js"></script>
</body>
</html>
